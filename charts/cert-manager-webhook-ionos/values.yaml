# The GroupName here is used to identify your company or business unit that
# created this webhook.
# For example, this may be "acme.mycompany.com".
# This name will need to be referenced in each Issuer's `webhook` stanza to
# inform cert-manager of where to send ChallengePayload resources in order to
# solve the DNS01 challenge.
# This group name should be **unique**, hence using your own company's domain
# here is recommended.
replicaCount: 1

groupName: acme.fabmade.de

certManager:
  namespace: cert-manager
  serviceAccountName: cert-manager

image:
  repository: fabmade/cert-manager-webhook-ionos
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 443

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Optional: Override DNS settings for the webhook pod.
# Useful when cluster DNS cannot resolve external APIs (e.g. api.hosting.ionos.com).
# Example for using public DNS:
#   dnsPolicy: "None"
#   dnsConfig:
#     nameservers:
#       - 1.1.1.1
#       - 8.8.8.8
dnsPolicy: ""
dnsConfig: {}
